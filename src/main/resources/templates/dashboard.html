<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{fragments/layout :: head('Tổng quan')}"></head>

<body>
    <div class="bg-white text-slate-900 font-display min-h-screen flex overflow-hidden">
        <!-- Sidebar -->
        <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>

        <!-- Main area -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Header -->
            <div th:replace="~{fragments/layout :: header('Tổng quan')}"></div>

            <!-- Content -->
            <main class="flex-1 overflow-y-auto p-6 lg:p-10 bg-gray-50">
                <div class="space-y-8">
                    <!-- Welcome -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div>
                            <h2 class="text-3xl font-black text-slate-900 mb-2" id="welcomeText">
                                Chào mừng! 👋
                            </h2>
                            <p class="text-lg text-slate-600" id="welcomeSub">Dưới đây là tổng quan hệ thống.</p>
                        </div>
                    </div>

                    <!-- Stats cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="statsCards">
                        <!-- Card 1 -->
                        <div
                            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5 hover:shadow-md transition-shadow">
                            <div class="size-16 rounded-xl bg-blue-100 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined text-4xl">person</span>
                            </div>
                            <div>
                                <p class="text-slate-500 font-medium text-lg">Vai trò</p>
                                <h3 class="text-2xl font-black text-slate-900 mt-1" id="statRole">...</h3>
                            </div>
                        </div>
                        <!-- Card 2 -->
                        <div
                            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5 hover:shadow-md transition-shadow">
                            <div
                                class="size-16 rounded-xl bg-emerald-100 flex items-center justify-center text-emerald-600">
                                <span class="material-symbols-outlined text-4xl">verified_user</span>
                            </div>
                            <div>
                                <p class="text-slate-500 font-medium text-lg">Trạng thái</p>
                                <h3 class="text-2xl font-black text-emerald-600 mt-1">Đang hoạt động</h3>
                            </div>
                        </div>
                        <!-- Card 3 -->
                        <div
                            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5 hover:shadow-md transition-shadow">
                            <div
                                class="size-16 rounded-xl bg-orange-100 flex items-center justify-center text-orange-600">
                                <span class="material-symbols-outlined text-4xl">schedule</span>
                            </div>
                            <div>
                                <p class="text-slate-500 font-medium text-lg">Phiên đăng nhập</p>
                                <h3 class="text-xl font-black text-slate-900 mt-1" id="statSession">---</h3>
                            </div>
                        </div>
                    </div>

                    <!-- User Info card -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b border-slate-200">
                            <h3 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                                <span class="material-symbols-outlined text-primary">account_circle</span>
                                Thông tin tài khoản
                            </h3>
                        </div>
                        <div class="p-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="flex flex-col gap-1">
                                    <span class="text-sm text-slate-500 font-medium uppercase tracking-wider">Họ và
                                        tên</span>
                                    <span class="text-lg font-bold text-slate-900" id="infoName">---</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <span class="text-sm text-slate-500 font-medium uppercase tracking-wider">Số điện
                                        thoại</span>
                                    <span class="text-lg font-bold text-slate-900" id="infoPhone">---</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <span
                                        class="text-sm text-slate-500 font-medium uppercase tracking-wider">Email</span>
                                    <span class="text-lg font-bold text-slate-900" id="infoEmail">---</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <span class="text-sm text-slate-500 font-medium uppercase tracking-wider">Vai
                                        trò</span>
                                    <span class="text-lg font-bold text-slate-900" id="infoRole">---</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script th:replace="~{fragments/layout :: authScript}"></script>
    <script>
        const roleMap = { ADMIN: 'Quản trị viên', TEACHER: 'Giáo viên', STUDENT: 'Học sinh' };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Fetch dashboard data
                const res = await fetch('/api/dashboard');
                const data = await res.json();

                if (data.success && data.data) {
                    const d = data.data;
                    document.getElementById('welcomeText').textContent = d.message || 'Chào mừng! 👋';
                    document.getElementById('statRole').textContent = roleMap[d.role] || d.role;

                    const now = new Date();
                    document.getElementById('statSession').textContent = now.toLocaleDateString('vi-VN') + ' ' + now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                }

                // Fetch user info
                const meRes = await fetch('/api/auth/me');
                const meData = await meRes.json();
                if (meData.success && meData.data) {
                    const u = meData.data;
                    document.getElementById('infoName').textContent = u.fullName || '---';
                    document.getElementById('infoPhone').textContent = u.phone || '---';
                    document.getElementById('infoEmail').textContent = u.email || 'Chưa cập nhật';
                    document.getElementById('infoRole').textContent = roleMap[u.role] || u.role;

                    const sub = u.role === 'ADMIN' ? 'Dưới đây là tổng quan hệ thống.' :
                        u.role === 'TEACHER' ? 'Dưới đây là tổng quan lớp học của bạn.' :
                            'Dưới đây là thông tin học tập của bạn.';
                    document.getElementById('welcomeSub').textContent = sub;
                }
            } catch (err) {
                console.error('Dashboard load error:', err);
            }
        });
    </script>
</body>

</html>
