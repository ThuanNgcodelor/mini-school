<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{fragments/layout :: head('Học phí')}"></head>

<body>
    <div class="bg-white text-slate-900 font-display min-h-screen flex overflow-hidden">
        <div th:replace="~{fragments/layout :: sidebar('tuition')}"></div>
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <div th:replace="~{fragments/layout :: header('Học phí')}"></div>
            <main class="flex-1 overflow-y-auto p-4 lg:p-10 bg-gray-50">
                <div class="space-y-5 lg:space-y-8">
                    <!-- Header -->
                    <div>
                        <a id="backLink"
                            class="text-primary font-medium flex items-center gap-1 mb-2 hover:underline text-sm lg:text-lg">
                            <span class="material-symbols-outlined text-base lg:text-xl">arrow_back</span> Quay lại lớp
                        </a>
                        <h2 class="text-2xl lg:text-4xl font-black text-slate-900" id="className">Đang tải...</h2>
                    </div>

                    <!-- Summary Cards -->
                    <div class="grid grid-cols-3 lg:grid-cols-3 gap-3 lg:gap-6">
                        <div
                            class="bg-gradient-to-br from-emerald-50 to-emerald-100 border border-emerald-200 p-3 lg:p-8 rounded-xl lg:rounded-2xl">
                            <div class="flex items-center gap-2 mb-1 lg:mb-3">
                                <span
                                    class="material-symbols-outlined text-emerald-500 text-xl lg:text-4xl">check_circle</span>
                                <p class="text-xs lg:text-lg text-slate-500 font-medium">Đã thu</p>
                            </div>
                            <p class="text-lg lg:text-4xl font-black text-emerald-600" id="totalPaid">0đ</p>
                        </div>
                        <div
                            class="bg-gradient-to-br from-orange-50 to-orange-100 border border-orange-200 p-3 lg:p-8 rounded-xl lg:rounded-2xl">
                            <div class="flex items-center gap-2 mb-1 lg:mb-3">
                                <span
                                    class="material-symbols-outlined text-orange-500 text-xl lg:text-4xl">pending</span>
                                <p class="text-xs lg:text-lg text-slate-500 font-medium">Chưa thu</p>
                            </div>
                            <p class="text-lg lg:text-4xl font-black text-orange-600" id="totalUnpaid">0đ</p>
                        </div>
                        <div
                            class="bg-gradient-to-br from-blue-50 to-blue-100 border border-blue-200 p-3 lg:p-8 rounded-xl lg:rounded-2xl">
                            <div class="flex items-center gap-2 mb-1 lg:mb-3">
                                <span class="material-symbols-outlined text-primary text-xl lg:text-4xl">payments</span>
                                <p class="text-xs lg:text-lg text-slate-500 font-medium">HP/tháng</p>
                            </div>
                            <p class="text-lg lg:text-4xl font-black text-primary" id="feePerMonth">0đ</p>
                        </div>
                    </div>

                    <div id="msgBox"
                        class="hidden p-3 lg:p-4 rounded-xl font-medium flex items-center gap-2 text-sm lg:text-lg">
                    </div>

                    <!-- MOBILE: Student cards (hidden on desktop) -->
                    <div id="mobileCards" class="lg:hidden space-y-4"></div>

                    <!-- DESKTOP: Payment grid table (hidden on mobile) -->
                    <div class="hidden lg:block bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b border-slate-200 flex items-center justify-between">
                            <h3 class="text-xl font-bold flex items-center gap-2">
                                <span class="material-symbols-outlined text-primary text-2xl">payments</span> Bảng theo
                                dõi học phí
                            </h3>
                            <div class="flex items-center gap-6 text-base font-medium">
                                <span class="flex items-center gap-2"><span
                                        class="inline-block w-10 h-10 rounded-lg bg-emerald-100 border-2 border-emerald-400 text-center leading-10 text-xl">✅</span>
                                    Đã đóng</span>
                                <span class="flex items-center gap-2"><span
                                        class="inline-block w-10 h-10 rounded-lg bg-white border-2 border-slate-200 text-center leading-10 text-xl text-slate-300">—</span>
                                    Chưa đóng</span>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-base">
                                <thead id="gridHead">
                                    <tr>
                                        <th class="py-5 px-6">Đang tải...</th>
                                    </tr>
                                </thead>
                                <tbody id="gridBody">
                                    <tr>
                                        <td class="py-16 text-center text-slate-400 text-lg">Đang tải dữ liệu...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Confirm Modal -->
                <div id="confirmModal"
                    class="hidden fixed inset-0 z-50 flex items-end lg:items-center justify-center p-0 lg:p-4 bg-slate-900/50 backdrop-blur-sm">
                    <div
                        class="w-full max-w-xl bg-white rounded-t-2xl lg:rounded-2xl shadow-2xl max-h-[85vh] overflow-y-auto">
                        <div class="p-5 lg:p-6 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                            <h3 class="text-xl lg:text-2xl font-bold">Xác nhận đóng tiền</h3>
                            <button onclick="closeModal()"
                                class="text-slate-400 hover:text-slate-600 cursor-pointer"><span
                                    class="material-symbols-outlined text-2xl">close</span></button>
                        </div>
                        <div class="p-5 lg:p-6">
                            <p class="text-base lg:text-lg text-slate-600 mb-4">Chọn các tháng cho <strong
                                    id="modalStudentName" class="text-primary"></strong>:</p>
                            <div id="monthCheckboxes" class="grid grid-cols-2 lg:grid-cols-3 gap-2 lg:gap-3 mb-5"></div>
                            <div class="flex gap-3">
                                <button onclick="doConfirm()"
                                    class="flex-1 h-12 lg:h-14 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl cursor-pointer transition-all text-base lg:text-lg flex items-center justify-center gap-2">
                                    <span class="material-symbols-outlined">check_circle</span> Đã đóng
                                </button>
                                <button onclick="doUndo()"
                                    class="flex-1 h-12 lg:h-14 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl cursor-pointer transition-all text-base lg:text-lg flex items-center justify-center gap-2">
                                    <span class="material-symbols-outlined">undo</span> Hoàn tác
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script th:replace="~{fragments/layout :: authScript}"></script>
    <script>
        const classId = window.location.pathname.split('/').filter(Boolean)[2];
        document.getElementById('backLink').href = '/teacher/classes/' + classId;
        let currentEnrollmentId = null;

        function fmt(n) { return Number(n).toLocaleString('vi-VN') + 'đ'; }

        function showMsg(text, ok) {
            const el = document.getElementById('msgBox');
            el.className = ok
                ? 'p-3 lg:p-4 rounded-xl font-medium flex items-center gap-2 text-sm lg:text-lg bg-emerald-50 border border-emerald-200 text-emerald-700'
                : 'p-3 lg:p-4 rounded-xl font-medium flex items-center gap-2 text-sm lg:text-lg bg-red-50 border border-red-200 text-red-700';
            el.innerHTML = `<span class="material-symbols-outlined">${ok ? 'check_circle' : 'error'}</span>${text}`;
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        async function loadPayments() {
            const res = await fetch('/api/teacher/classes/' + classId + '/payments');
            const data = await res.json();
            if (!data.success) { showMsg(data.message, false); return; }
            const d = data.data;

            document.getElementById('className').textContent = d.classroomName + ' — Học phí';
            document.getElementById('totalPaid').textContent = fmt(d.totalPaid);
            document.getElementById('totalUnpaid').textContent = fmt(d.totalUnpaid);
            document.getElementById('feePerMonth').textContent = fmt(d.tuitionFee);

            const columns = d.columns || [];

            // ── DESKTOP TABLE ──
            const thead = document.getElementById('gridHead');
            thead.innerHTML = `<tr class="bg-slate-50 border-b border-slate-200">
                <th class="py-5 px-6 text-left font-bold text-sm uppercase tracking-wider sticky left-0 bg-slate-50 z-10 min-w-[200px]">Học sinh</th>
                ${columns.map(c => `<th class="py-5 px-3 text-center font-bold text-sm uppercase min-w-[85px]">${c.label}</th>`).join('')}
                <th class="py-5 px-6 text-center font-bold text-sm uppercase min-w-[120px]">Thao tác</th>
            </tr>`;

            const tbody = document.getElementById('gridBody');
            if (!d.students || d.students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + (columns.length + 2) + '" class="py-16 text-center text-slate-400 text-lg">Chưa có học sinh</td></tr>';
                document.getElementById('mobileCards').innerHTML = '<p class="text-center text-slate-400 py-8">Chưa có học sinh</p>';
                return;
            }

            // Desktop table rows
            tbody.innerHTML = d.students.map(s => {
                const monthMap = {};
                s.months.forEach(m => { monthMap[m.month] = m.status; });
                let cells = `<td class="py-5 px-6 font-bold sticky left-0 bg-white z-10 border-r border-slate-100">
                    <div class="text-lg">${s.fullName}</div>
                    <div class="text-xs text-slate-400 font-mono mt-1">${s.studentCode}</div></td>`;
                columns.forEach(col => {
                    const status = monthMap[col.key];
                    if (!status) {
                        cells += `<td class="py-5 px-3 text-center"><span class="text-slate-200 text-lg">—</span></td>`;
                    } else if (status === 'PAID') {
                        cells += `<td class="py-5 px-3 text-center"><span class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-emerald-100 text-emerald-600 text-2xl font-bold border-2 border-emerald-300">✅</span></td>`;
                    } else {
                        cells += `<td class="py-5 px-3 text-center"><span class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-white text-slate-300 text-2xl border-2 border-slate-200 border-dashed">—</span></td>`;
                    }
                });
                cells += `<td class="py-5 px-6 text-center">
                    <button onclick='openModal(${s.enrollmentId}, "${s.fullName}", ${JSON.stringify(s.months)})'
                        class="bg-primary/10 text-primary hover:bg-primary hover:text-white px-6 py-3 rounded-xl text-base font-bold cursor-pointer transition-all">
                        <span class="material-symbols-outlined text-lg align-middle">edit_note</span> Chọn
                    </button></td>`;
                return `<tr class="hover:bg-slate-50/50 border-b border-slate-100">${cells}</tr>`;
            }).join('');

            // ── MOBILE CARDS ──
            const mobileCards = document.getElementById('mobileCards');
            mobileCards.innerHTML = d.students.map(s => {
                const paidCount = s.months.filter(m => m.status === 'PAID').length;
                const totalCount = s.months.length;
                // Build a 4-col grid of small month indicators
                const monthGrid = s.months.map(m => {
                    if (m.status === 'PAID') {
                        return `<div class="bg-emerald-100 border border-emerald-300 rounded-lg p-1.5 text-center">
                            <div class="text-[10px] text-emerald-700 font-bold">${m.monthLabel}</div>
                            <div class="text-sm">✅</div></div>`;
                    } else {
                        return `<div class="bg-slate-50 border border-slate-200 border-dashed rounded-lg p-1.5 text-center">
                            <div class="text-[10px] text-slate-400 font-bold">${m.monthLabel}</div>
                            <div class="text-sm text-slate-300">—</div></div>`;
                    }
                }).join('');

                return `<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-4 flex items-center justify-between border-b border-slate-100">
                        <div>
                            <p class="font-bold text-base">${s.fullName}</p>
                            <p class="text-xs text-slate-400 font-mono">${s.studentCode}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-bold ${paidCount === totalCount ? 'text-emerald-600' : 'text-orange-500'}">${paidCount}/${totalCount} tháng</span>
                        </div>
                    </div>
                    <div class="p-3 grid grid-cols-4 gap-1.5">${monthGrid}</div>
                    <div class="p-3 pt-0">
                        <button onclick='openModal(${s.enrollmentId}, "${s.fullName}", ${JSON.stringify(s.months)})'
                            class="w-full h-10 bg-primary/10 text-primary hover:bg-primary hover:text-white rounded-lg text-sm font-bold cursor-pointer transition-all flex items-center justify-center gap-1">
                            <span class="material-symbols-outlined text-base">edit_note</span> Xác nhận đóng tiền
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function openModal(enrollmentId, name, months) {
            currentEnrollmentId = enrollmentId;
            document.getElementById('modalStudentName').textContent = name;
            const container = document.getElementById('monthCheckboxes');
            container.innerHTML = months.map(m => {
                const isPaid = m.status === 'PAID';
                const bg = isPaid ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200';
                const icon = isPaid ? '✅' : '—';
                return `<label class="flex items-center gap-2 lg:gap-3 p-3 lg:p-4 rounded-xl border-2 ${bg} cursor-pointer hover:opacity-80 transition-opacity">
                    <input type="checkbox" value="${m.month}" class="w-5 h-5 accent-primary" />
                    <span class="text-sm lg:text-base font-bold flex-1">${m.monthLabel}</span>
                    <span class="text-lg">${icon}</span>
                </label>`;
            }).join('');
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('confirmModal').classList.add('hidden'); }

        function getSelectedMonths() {
            return Array.from(document.querySelectorAll('#monthCheckboxes input:checked')).map(cb => parseInt(cb.value));
        }

        async function doConfirm() {
            const months = getSelectedMonths();
            if (months.length === 0) { alert('Chọn ít nhất 1 tháng'); return; }
            const res = await fetch('/api/teacher/classes/' + classId + '/payments/confirm', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enrollmentId: currentEnrollmentId, months })
            });
            const data = await res.json();
            closeModal(); showMsg(data.message, data.success); loadPayments();
        }

        async function doUndo() {
            const months = getSelectedMonths();
            if (months.length === 0) { alert('Chọn ít nhất 1 tháng'); return; }
            if (!confirm('Hoàn tác xác nhận thanh toán cho ' + months.length + ' tháng?')) return;
            const res = await fetch('/api/teacher/classes/' + classId + '/payments/undo', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enrollmentId: currentEnrollmentId, months })
            });
            const data = await res.json();
            closeModal(); showMsg(data.message, data.success); loadPayments();
        }

        document.addEventListener('DOMContentLoaded', loadPayments);
    </script>
</body>

</html>
