<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{fragments/layout :: head('Đăng ký')}"></head>

<body>
    <div class="bg-white text-slate-900 font-display min-h-screen flex flex-col">
        <!-- Header -->
        <header
            class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 bg-white px-6 lg:px-10 py-4 shadow-sm">
            <div class="flex items-center gap-4 text-slate-900">
                <div class="size-8 text-primary">
                    <svg class="w-full h-full" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold leading-tight tracking-tight">Quản lý Lớp học</h2>
            </div>
            <div class="hidden md:flex flex-1 justify-end gap-8 items-center">
                <a th:href="@{/login}"
                    class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-6 bg-primary/10 hover:bg-primary/20 text-primary text-sm font-bold leading-normal tracking-wide transition-colors">
                    <span class="truncate">Đăng nhập</span>
                </a>
            </div>
        </header>

        <!-- Main content -->
        <main class="flex-grow flex items-center justify-center p-4 py-12">
            <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="px-8 pt-10 pb-6 text-center">
                    <h1 class="text-3xl lg:text-4xl font-black text-slate-900 mb-3 tracking-tight">Đăng ký tài khoản
                    </h1>
                    <p class="text-slate-500 text-lg">Chọn vai trò của bạn</p>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-slate-200 mx-6 lg:mx-12">
                    <button id="tabTeacher" onclick="switchTab('teacher')"
                        class="flex-1 py-4 text-lg font-bold text-primary border-b-2 border-primary transition-all">
                        <span class="material-symbols-outlined align-middle mr-1">school</span> Giáo viên
                    </button>
                    <button id="tabStudent" onclick="switchTab('student')"
                        class="flex-1 py-4 text-lg font-bold text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-all">
                        <span class="material-symbols-outlined align-middle mr-1">person</span> Học sinh
                    </button>
                </div>

                <!-- Messages -->
                <div id="successMsg"
                    class="hidden mx-6 lg:mx-12 mt-6 p-4 bg-emerald-50 border border-emerald-200 rounded-lg text-emerald-700 text-base font-medium flex items-center gap-2">
                    <span class="material-symbols-outlined text-emerald-500">check_circle</span>
                    <span id="successText"></span>
                </div>
                <div id="errorMsg"
                    class="hidden mx-6 lg:mx-12 mt-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-base font-medium flex items-center gap-2">
                    <span class="material-symbols-outlined text-red-500">error</span>
                    <span id="errorText"></span>
                </div>

                <!-- Teacher Form -->
                <form id="teacherForm" class="px-6 lg:px-12 py-6 flex flex-col gap-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Họ và tên *</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="tFullName" placeholder="Nguyễn Văn A" required />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Số điện thoại *</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="tPhone" placeholder="0912 345 678" type="tel" required />
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Email</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="tEmail" placeholder="email@example.com" type="email" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Chuyên môn</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="tSpec" placeholder="Toán, Lý, Hóa..." />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 text-base font-bold">Mật khẩu *</label>
                        <input
                            class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                            id="tPassword" type="password" placeholder="Tối thiểu 6 ký tự" required />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 text-base font-bold">Mã mời (Invite Code) *</label>
                        <input
                            class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base font-mono focus:border-primary focus:ring-2 focus:ring-primary/20"
                            id="tInviteCode" placeholder="TEACHER-2025-XXXXXX" required />
                        <p class="text-sm text-slate-500">Liên hệ quản trị viên để nhận mã mời</p>
                    </div>
                    <button type="submit"
                        class="mt-2 w-full bg-primary hover:bg-blue-700 text-white font-bold text-lg h-14 rounded-lg shadow-lg shadow-blue-500/20 active:scale-[0.99] transition-all flex items-center justify-center gap-2 cursor-pointer">
                        Đăng ký Giáo viên
                    </button>
                </form>

                <!-- Student Form -->
                <form id="studentForm" class="hidden px-6 lg:px-12 py-6 flex flex-col gap-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Họ và tên *</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="sFullName" placeholder="Nguyễn Văn B" required />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Số điện thoại *</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="sPhone" placeholder="0912 345 678" type="tel" required />
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">Tên phụ huynh</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="sParentName" placeholder="Tên phụ huynh" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-slate-900 text-base font-bold">SĐT phụ huynh</label>
                            <input
                                class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                                id="sParentPhone" placeholder="0987 654 321" type="tel" />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 text-base font-bold">Mật khẩu *</label>
                        <input
                            class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base focus:border-primary focus:ring-2 focus:ring-primary/20"
                            id="sPassword" type="password" placeholder="Tối thiểu 6 ký tự" required />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 text-base font-bold">Mã lớp học *</label>
                        <input
                            class="w-full rounded-lg border border-slate-300 bg-slate-50 h-12 px-4 text-base font-mono focus:border-primary focus:ring-2 focus:ring-primary/20"
                            id="sClassCode" placeholder="T10A-X7K" required />
                        <p class="text-sm text-slate-500">Nhận mã lớp từ giáo viên của bạn</p>
                    </div>
                    <button type="submit"
                        class="mt-2 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-lg h-14 rounded-lg shadow-lg shadow-emerald-500/20 active:scale-[0.99] transition-all flex items-center justify-center gap-2 cursor-pointer">
                        Đăng ký Học sinh
                    </button>
                </form>

                <div class="px-8 pb-10 pt-2 text-center">
                    <p class="text-base text-slate-600">
                        Đã có tài khoản?
                        <a class="text-primary font-bold hover:underline ml-1 text-lg" th:href="@{/login}">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </main>

        <div class="h-2 w-full bg-gradient-to-r from-blue-400 via-primary to-blue-600"></div>
    </div>

    <script>
        function switchTab(tab) {
            const teacherForm = document.getElementById('teacherForm');
            const studentForm = document.getElementById('studentForm');
            const tabTeacher = document.getElementById('tabTeacher');
            const tabStudent = document.getElementById('tabStudent');
            hideMessages();

            if (tab === 'teacher') {
                teacherForm.classList.remove('hidden');
                studentForm.classList.add('hidden');
                tabTeacher.classList.add('text-primary', 'border-primary');
                tabTeacher.classList.remove('text-slate-400', 'border-transparent');
                tabStudent.classList.remove('text-primary', 'border-primary');
                tabStudent.classList.add('text-slate-400', 'border-transparent');
            } else {
                teacherForm.classList.add('hidden');
                studentForm.classList.remove('hidden');
                tabStudent.classList.add('text-primary', 'border-primary');
                tabStudent.classList.remove('text-slate-400', 'border-transparent');
                tabTeacher.classList.remove('text-primary', 'border-primary');
                tabTeacher.classList.add('text-slate-400', 'border-transparent');
            }
        }

        function showError(msg) {
            document.getElementById('successMsg').classList.add('hidden');
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.remove('hidden');
        }

        function showSuccess(msg) {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMsg').classList.remove('hidden');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }

        // Teacher registration
        document.getElementById('teacherForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideMessages();
            try {
                const res = await fetch('/api/auth/register/teacher', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: document.getElementById('tFullName').value.trim(),
                        phone: document.getElementById('tPhone').value.trim(),
                        email: document.getElementById('tEmail').value.trim(),
                        password: document.getElementById('tPassword').value,
                        inviteCode: document.getElementById('tInviteCode').value.trim(),
                        specialization: document.getElementById('tSpec').value.trim()
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess('Đăng ký thành công! Chuyển sang đăng nhập...');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('Không thể kết nối server');
            }
        });

        // Student registration
        document.getElementById('studentForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideMessages();
            try {
                const res = await fetch('/api/auth/register/student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: document.getElementById('sFullName').value.trim(),
                        phone: document.getElementById('sPhone').value.trim(),
                        password: document.getElementById('sPassword').value,
                        classCode: document.getElementById('sClassCode').value.trim(),
                        parentName: document.getElementById('sParentName').value.trim(),
                        parentPhone: document.getElementById('sParentPhone').value.trim()
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess('Đăng ký thành công! Chuyển sang đăng nhập...');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('Không thể kết nối server');
            }
        });
    </script>
</body>

</html>
