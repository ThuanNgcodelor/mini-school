<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Fragment: head -->

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | EduManager'">EduManager</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a47c2',
                    },
                    fontFamily: {
                        display: ['Lexend', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<!-- Fragment: sidebar -->
<div th:fragment="sidebar(activePage)">
    <!-- Mobile overlay backdrop -->
    <div id="sidebarOverlay" onclick="closeSidebar()" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden"></div>
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col h-screen
        fixed z-40
        -translate-x-full lg:translate-x-0 lg:static
        transition-transform duration-200 ease-in-out">
        <div class="h-20 flex items-center justify-between px-6 border-b border-slate-200">
            <div class="flex items-center gap-3 text-primary">
                <div class="size-8">
                    <svg class="w-full h-full" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-slate-900">EduManager</h2>
            </div>
            <!-- Close button (mobile only) -->
            <button onclick="closeSidebar()" class="lg:hidden text-slate-400 hover:text-slate-600 cursor-pointer">
                <span class="material-symbols-outlined text-2xl">close</span>
            </button>
        </div>
        <nav id="sidebarNav" class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <!-- Dashboard (always visible) -->
            <a href="/dashboard"
                th:classappend="${activePage == 'dashboard'} ? 'bg-primary/10 text-primary nav-active' : 'text-slate-600 hover:bg-slate-50 hover:text-primary'"
                class="flex items-center gap-4 px-4 py-3 rounded-lg transition-colors group">
                <span class="material-symbols-outlined group-hover:text-primary transition-colors">dashboard</span>
                <span th:classappend="${activePage == 'dashboard'} ? 'font-bold' : 'font-medium'" class="text-lg">Tổng
                    quan</span>
            </a>

            <!-- Role-specific menu items (rendered by JS) -->
            <div id="roleMenuItems"></div>

            <!-- Divider -->
            <div class="border-t border-slate-200 my-4"></div>
        </nav>
    </aside>
</div>

<!-- Fragment: header -->
<div th:fragment="header(pageLabel)">
    <header
        class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-10 flex-shrink-0">
        <div class="flex items-center gap-3">
            <!-- Hamburger button (mobile only) -->
            <button onclick="openSidebar()"
                class="lg:hidden text-slate-600 hover:text-primary p-2 -ml-2 cursor-pointer">
                <span class="material-symbols-outlined text-2xl">menu</span>
            </button>
            <h1 class="text-xl lg:text-2xl font-bold text-slate-800" th:text="${pageLabel}">Dashboard</h1>
        </div>
        <div class="flex items-center gap-3 lg:gap-6">
            <button class="relative p-2 text-slate-500 hover:text-primary transition-colors">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="flex items-center gap-3 pl-3 lg:pl-6 border-l border-slate-200">
                <div class="size-10 rounded-full ring-2 ring-primary/20 bg-primary/10 flex items-center justify-center text-primary font-bold text-lg"
                    id="userAvatar">?</div>
                <div class="hidden md:block">
                    <p class="text-base font-bold text-slate-900" id="userName">Đang tải...</p>
                    <p class="text-sm text-slate-500" id="userRole">...</p>
                </div>
            </div>
            <button onclick="logout()"
                class="flex items-center gap-2 px-3 lg:px-4 py-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors text-base font-medium cursor-pointer">
                <span class="material-symbols-outlined text-xl">logout</span>
                <span class="hidden lg:inline">Đăng xuất</span>
            </button>
        </div>
    </header>
</div>

<!-- Fragment: common JS for authenticated pages -->
<script th:fragment="authScript">
    // ── Sidebar toggle ──
    function openSidebar() {
        document.getElementById('sidebar').classList.remove('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.add('hidden');
        document.body.style.overflow = '';
    }

    // ── Menu items per role ──
    const MENU_CONFIG = {
        ADMIN: [
            { href: '/admin/invite-codes', icon: 'vpn_key', label: 'Mã mời GV' },
            { href: '/admin/subjects', icon: 'menu_book', label: 'Môn học' },
        ],
        TEACHER: [
            { href: '/teacher/classes', icon: 'school', label: 'Lớp học' },
        ],
        STUDENT: [
            { href: '/student/classes', icon: 'school', label: 'Lớp đang học' },
            { href: '/student/join-class', icon: 'vpn_key', label: 'Tham gia lớp' },
        ]
    };

    function buildSidebar(role) {
        const container = document.getElementById('roleMenuItems');
        if (!container) return;
        const items = MENU_CONFIG[role] || [];
        const currentPath = window.location.pathname;

        container.innerHTML = items.map(item => {
            const isActive = currentPath.startsWith(item.href);
            const activeClass = isActive
                ? 'bg-primary/10 text-primary'
                : 'text-slate-600 hover:bg-slate-50 hover:text-primary';
            const fontClass = isActive ? 'font-bold' : 'font-medium';
            return `<a href="${item.href}" class="flex items-center gap-4 px-4 py-3 rounded-lg transition-colors group ${activeClass}">
                <span class="material-symbols-outlined group-hover:text-primary transition-colors">${item.icon}</span>
                <span class="text-lg ${fontClass}">${item.label}</span>
            </a>`;
        }).join('');
    }

    function highlightDashboard() {
        const path = window.location.pathname;
        const dashLink = document.querySelector('#sidebarNav > a[href="/dashboard"]');
        if (dashLink && (path === '/' || path === '/dashboard')) {
            dashLink.classList.add('bg-primary/10', 'text-primary');
            dashLink.classList.remove('text-slate-600');
        } else if (dashLink) {
            dashLink.classList.remove('bg-primary/10', 'text-primary');
            dashLink.classList.add('text-slate-600');
        }
    }

    // ── Load current user info ──
    async function loadCurrentUser() {
        try {
            const res = await fetch('/api/auth/me');
            const data = await res.json();
            if (data.success && data.data) {
                const user = data.data;
                const nameEl = document.getElementById('userName');
                const roleEl = document.getElementById('userRole');
                const avatarEl = document.getElementById('userAvatar');

                if (nameEl) nameEl.textContent = user.fullName;
                if (avatarEl) avatarEl.textContent = user.fullName ? user.fullName.charAt(0).toUpperCase() : '?';

                const roleMap = { ADMIN: 'Quản trị viên', TEACHER: 'Giáo viên', STUDENT: 'Học sinh' };
                if (roleEl) roleEl.textContent = roleMap[user.role] || user.role;

                buildSidebar(user.role);
                highlightDashboard();

                return user;
            } else {
                window.location.href = '/login';
            }
        } catch (err) {
            window.location.href = '/login';
        }
    }

    async function logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login';
    }

    document.addEventListener('DOMContentLoaded', () => loadCurrentUser());
</script>

</html>
