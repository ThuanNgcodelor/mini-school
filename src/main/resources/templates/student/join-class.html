<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{fragments/layout :: head('Tham gia lớp')}"></head>

<body>
    <div class="bg-white text-slate-900 font-display min-h-screen flex overflow-hidden">
        <div th:replace="~{fragments/layout :: sidebar('class')}"></div>
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <div th:replace="~{fragments/layout :: header('Tham gia lớp')}"></div>
            <main class="flex-1 overflow-y-auto p-6 lg:p-10 bg-gray-50">
                <div class="max-w-lg mx-auto">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-8 pt-10 pb-6 text-center">
                            <div
                                class="size-20 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <span class="material-symbols-outlined text-4xl">vpn_key</span>
                            </div>
                            <h2 class="text-2xl font-black mb-2">Tham gia lớp học</h2>
                            <p class="text-slate-500">Nhập mã lớp do giáo viên cung cấp</p>
                        </div>
                        <div id="msgBox" class="hidden mx-8 mb-4 p-4 rounded-lg font-medium flex items-center gap-2">
                        </div>
                        <form id="joinForm" class="px-8 pb-10 space-y-4">
                            <input id="classCodeInput"
                                class="w-full h-14 px-4 rounded-xl border border-slate-300 bg-slate-50 font-mono text-center text-lg tracking-widest uppercase focus:border-primary focus:ring-2 focus:ring-primary/20"
                                placeholder="NHẬP MÃ LỚP" required />
                            <button type="submit"
                                class="w-full h-14 bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-lg rounded-xl shadow-lg cursor-pointer transition-all active:scale-[0.99]">
                                Tham gia
                            </button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script th:replace="~{fragments/layout :: authScript}"></script>
    <script>
        document.getElementById('joinForm').addEventListener('submit', async e => {
            e.preventDefault();
            const msgBox = document.getElementById('msgBox');
            msgBox.classList.add('hidden');
            const code = document.getElementById('classCodeInput').value.trim();
            if (!code) return;
            const res = await fetch('/api/student/join-class', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ classCode: code })
            });
            const data = await res.json();
            msgBox.classList.remove('hidden');
            if (data.success) {
                msgBox.className = 'mx-8 mb-4 p-4 rounded-lg font-medium flex items-center gap-2 bg-emerald-50 border border-emerald-200 text-emerald-700';
                msgBox.innerHTML = '<span class="material-symbols-outlined">check_circle</span>' + data.message;
                setTimeout(() => window.location.href = '/student/classes', 1500);
            } else {
                msgBox.className = 'mx-8 mb-4 p-4 rounded-lg font-medium flex items-center gap-2 bg-red-50 border border-red-200 text-red-700';
                msgBox.innerHTML = '<span class="material-symbols-outlined">error</span>' + data.message;
            }
        });
    </script>
</body>

</html>
